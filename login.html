<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Project Polis</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { 
      display: flex; align-items: center; justify-content: center; min-height: 100vh; 
      background-image: url('https://images.unsplash.com/photo-1517737882586-7243c5ee0038?auto=format&fit=crop&w=2000&q=80'); 
      background-size: cover; background-position: center; 
    }
    .glass-card { 
      background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); 
      border: 1px solid var(--border-light); padding: 2.5rem; border-radius: var(--radius-lg); 
      width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
    }
    .auth-header { text-align: center; margin-bottom: 2rem; color: #ffffff; }
    .auth-header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #ffffff; }
    .auth-header p { color: #cbd5e1; font-size: 0.875rem; }
    .form-group label { color: #ffffff; font-weight: 500; }
    .glass-card { color: #ffffff; }
    .link { color: var(--primary); text-decoration: none; font-weight: 500; }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="glass-card">
    <div class="auth-header">
      <h1>Welcome Back</h1>
      <p>Log in to Project Polis</p>
    </div>
    <!-- Form submission redirects back to the main app -->
    <form id="login-form">
      <div class="form-group">
        <label>Email ID</label>
        <input type="email" id="login-email" placeholder="name@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn-primary w-full" style="margin-top: 1rem;">Login</button>
    </form>
    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
      Don't have an account? <a href="register.html" class="link">Sign up</a>
    </div>
  </div>
  <script>
    if (localStorage.getItem('polis_theme') === 'light') document.body.classList.add('light-theme');

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      
      const parts = email.split('@')[0].split('.');
      let name = parts.map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' ');
      if(parts.length === 1) name = name + ' User';
      
      const initials = name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
      
      localStorage.setItem('polis_user', JSON.stringify({ name, initials, email }));
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
