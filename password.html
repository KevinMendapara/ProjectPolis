<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Set Password - Step 3</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { 
      display: flex; align-items: center; justify-content: center; min-height: 100vh; 
      background-image: url('https://images.unsplash.com/photo-1517737882586-7243c5ee0038?auto=format&fit=crop&w=2000&q=80'); 
      background-size: cover; background-position: center; 
    }
    .glass-card { 
      background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); 
      border: 1px solid var(--border-light); padding: 2.5rem; border-radius: var(--radius-lg); 
      width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
    }
    .auth-header { text-align: center; margin-bottom: 2rem; }
    .auth-header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .auth-header p { color: var(--text-muted); font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="glass-card">
    <div class="auth-header">
      <h1>Secure Account</h1>
      <p>Step 3: Create a strong password</p>
    </div>
    <!-- Redirects back to login page upon success -->
    <form action="login.html" method="GET">
      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Create password" required>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm password" required>
      </div>
      <button type="submit" class="btn-primary w-full" style="margin-top: 1rem;">Finish & Login</button>
    </form>
  </div>
</body>
</html>
