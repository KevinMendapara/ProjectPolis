<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Step 1</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { 
      display: flex; align-items: center; justify-content: center; min-height: 100vh; 
      background-image: url('https://images.unsplash.com/photo-1517737882586-7243c5ee0038?auto=format&fit=crop&w=2000&q=80'); 
      background-size: cover; background-position: center; 
    }
    .glass-card { 
      background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); 
      border: 1px solid var(--border-light); padding: 2.5rem; border-radius: var(--radius-lg); 
      width: 100%; max-width: 450px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
    }
    .auth-header { text-align: center; margin-bottom: 2rem; color: #ffffff; }
    .auth-header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #ffffff; }
    .auth-header p { color: #cbd5e1; font-size: 0.875rem; }
    .form-group label { color: #ffffff; font-weight: 500; }
    .glass-card { color: #ffffff; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .link { color: var(--primary); text-decoration: none; font-weight: 500; }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="glass-card">
    <div class="auth-header">
      <h1>Create Account</h1>
      <p>Step 1: Personal Details</p>
    </div>
    <!-- Redirects to OTP verification step -->
    <form action="otp.html" method="GET">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" placeholder="John" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" placeholder="Doe" required>
        </div>
      </div>
      <div class="form-group">
        <label>Email ID</label>
        <input type="email" placeholder="name@example.com" required>
      </div>
      <button type="submit" class="btn-primary w-full" style="margin-top: 1rem;">Continue</button>
    </form>
    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
      Already have an account? <a href="login.html" class="link">Log in</a>
    </div>
  </div>
</body>
</html>
